server:
  port: 8080
  servlet:
    context-path: /swim
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:swim}
    username: ${DB_USERNAME:football}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
logging:
  level:
    root: INFO
    com.swim: DEBUG
    com.baomidou.mybatisplus: DEBUG
  file:
    name: logs/swim.log
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
wx:
  appid: ${WX_APPID:your-appid}
  secret: ${WX_SECRET:your-secret}
jwt:
  secret: ${JWT_SECRET:please-set-a-long-random-secret-at-least-256-bits}
  expire-days: 7
